name: Prediction Fill
on:
  schedule:
    - cron: '15 20 * * 1-5'  # Weekdays 20:15 UTC (22:15 CET, after TR cert close 22:00)
  workflow_dispatch:
jobs:
  fill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance numpy
      - run: python prediction_db.py fill
      - run: python prediction_db.py analyze --telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit predictions DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/predictions.db
          git diff --staged --quiet || git commit -m "predictions: fill outcomes [skip ci]"
          git push
