name: Silver Hawk Tracker

on:
  schedule:
    - cron: '*/10 7-21 * * 1-5'
    - cron: '0,30 0-6,22-23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run price check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker_check.py

      - name: Commit tracker state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add memory/tracker_state.json
          git diff --staged --quiet || git commit -m "tracker: update state [skip ci]"
          git push
