name: Silver Hawk Stock Updater

on:
  schedule:
    - cron: '0,30 13-21 * * 1-5'
    - cron: '0 7-12,22-23 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance numpy PyWavelets

      - name: Update stock data
        run: python update_stocks.py
        # Note: updates are written to local predictions.db on the runner.
        # Since the DB is gitignored (local to each user), no commit is needed.
        # This workflow validates that the updater runs without errors.
        # For price tracking, use the local dashboard or tracker_check.py.
