name: Silver Hawk Stock Updater

on:
  schedule:
    - cron: '0,30 13-21 * * 1-5'
    - cron: '0 7-12,22-23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance numpy PyWavelets

      - name: Update stock data
        run: python update_stocks.py

      - name: Commit updated watchlist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add memory/watchlist.json
          git diff --staged --quiet || git commit -m "stocks: update prices [skip ci]"
          git push
