name: Pre-Open Pattern Backtest

on:
  schedule:
    - cron: '0 6 * * 6'  # Samstag 06:00 UTC (07:00 CET)
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance numpy pandas PyWavelets

      - name: Run pre-open backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python preopen_backtest.py --telegram

      - name: Commit pattern DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/preopen_patterns.json
          git diff --staged --quiet || git commit -m "patterns: weekly pre-open backtest [skip ci]"
          git push
